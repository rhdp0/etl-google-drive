name: ETL Google Drive Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # Roda todos os dias às 03:00 (UTC), que equivale a meia-noite no Brasil
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permite rodar manualmente através de um botão no GitHub

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Acelera o tempo de build baixando o cache

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar Chave do Service Account (JSON)
        run: |
          mkdir -p credentials
          echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > credentials/service_account.json

      - name: Executar Pipeline ETL
        env:
          LANDING_FOLDER_ID: ${{ secrets.LANDING_FOLDER_ID }}
          RAW_FOLDER_ID: ${{ secrets.RAW_FOLDER_ID }}
          ARCHIVE_FOLDER_ID: ${{ secrets.ARCHIVE_FOLDER_ID }}
          TRUSTED_SHEET_ID: ${{ secrets.TRUSTED_SHEET_ID }}
        run: |
          python src/main.py
